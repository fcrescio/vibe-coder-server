name: vibe-coder-full

# ──────────────────────────────────────────────────────────────────────────
# v0.25.0 — `:full` 변형 예시 (Android Emulator + noVNC 포함).
#
# 슬림 (compose.yml) vs full 차이:
#   - 이미지: siamakerlab/vibe-coder-server:full (qemu + KVM userland + Xvfb +
#     fluxbox + x11vnc + websockify + novnc 사전 설치, +800MB)
#   - devices: /dev/kvm passthrough (host 의 kvm 그룹 GID 매칭)
#   - 포트: 6080 (noVNC HTTP+WS) 추가 노출 — 브라우저에서 컨테이너 emulator
#     화면을 직접 확인 (admin 인증은 별도 SSH 터널 / reverse-proxy 책임).
#
# 사용법:
#   cp compose.full.yml docker-compose.override.yml   # 또는 그대로 사용
#   docker compose -f compose.yml -f compose.full.yml up -d
#
# 보안 주의:
#   - 6080 은 인증 없는 raw VNC 게이트웨이. 외부 IP 노출 금지 — LAN 격리 또는
#     SSH 터널 (`ssh -L 6080:localhost:6080 user@host`) 후 http://localhost:6080
#     으로만 접근. 인증된 reverse-proxy 통합은 v0.26+ 예정.
#   - KVM passthrough = host kernel 인터페이스 직접 접근. 컨테이너 격리
#     boundary 가 약해짐. 신뢰된 admin 단일 사용자 환경에서만 사용.
# ──────────────────────────────────────────────────────────────────────────

services:
  # postgres 는 슬림 compose.yml 의 정의를 그대로 상속 (`-f compose.yml -f compose.full.yml`).

  vibe-coder-server:
    # :full 이미지로 교체 (~3-4GB. emulator + noVNC 포함)
    image: ${VIBECODER_IMAGE_FULL:-siamakerlab/vibe-coder-server:full}

    # 컨테이너 안에 /dev/kvm 패스스루 (Linux host 필수, macOS/Windows 는 KVM
    # 없음 → 자동으로 software 모드로 떨어져 매우 느림).
    devices:
      - /dev/kvm:/dev/kvm

    # host 의 kvm 그룹 GID 매칭. `getent group kvm | cut -d: -f3` 결과를
    # KVM_GID env 로 지정. Ubuntu 24.04 의 기본은 104, Fedora 등은 다를 수 있음.
    group_add:
      - "${KVM_GID:-104}"

    # noVNC 게이트웨이 노출. 인증 없는 raw VNC 이므로 LAN 격리 또는 SSH 터널
    # 가정. 외부 IP 직접 노출 시 vibe-coder admin 인증과 무관하게 emulator 화면이
    # 그대로 보임 — security risk.
    ports:
      - "${VIBE_PORT:-17880}:17880"
      - "${VIBE_NOVNC_PORT:-6080}:6080"

    # 슬림과 동일한 영구 볼륨 + Android SDK 의 system-image 가 :full 에선
    # 사전 다운로드되지 않으므로 /env-setup 또는 vibe-doctor 로 채워야 함.
    # (compose.yml 의 volumes 가 상속됨)

# host 환경변수 가이드 (.env 추가):
#
#   VIBECODER_IMAGE_FULL=siamakerlab/vibe-coder-server:full
#   KVM_GID=104                  # Ubuntu 24.04 기본. 본인 host: `getent group kvm`
#   VIBE_NOVNC_PORT=6080         # 호스트 노출 포트
#
# 부팅 후:
#   1. /emulator 페이지 진단에서 "KVM (/dev/kvm) ✓ 사용 가능" 확인.
#   2. "+ 디폴트 AVD 생성" 클릭 (sdkmanager 로 system-image 사전 설치 필요).
#   3. "▶ headless 시작" — 백그라운드 emulator 부팅.
#   4. 브라우저로 http://host:6080/vnc.html → noVNC 자동 connect → emulator 화면.
#
# 화면이 안 나오면:
#   - docker exec vibe-coder-server pgrep Xvfb       # Xvfb 떠 있어야 함
#   - docker exec vibe-coder-server pgrep websockify
#   - docker logs vibe-coder-server | grep entrypoint

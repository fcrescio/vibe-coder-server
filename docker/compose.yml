name: vibe-coder

# ──────────────────────────────────────────────────────────────────────────
# v0.14.0 — PostgreSQL migration.
#
# Earlier v0.13.x releases embedded SQLite in the server container. From v0.14.0,
# the PostgreSQL sidecar owns persistent database storage.
#
# Unified data directory (./vibe-coder-data):
#   vibe-coder-data/
#     ├── workspace/      ← project source / APKs
#     ├── postgres/       ← PostgreSQL data (v0.14.0+)
#     ├── server/         ← logs / build metadata
#     ├── dev-tools/      ← Android SDK / Gradle / MCP / Playwright / config
#     └── claude/         ← Claude OAuth credentials / MCP registrations
#
# A one-line backup still works: `tar czf backup.tar.gz vibe-coder-data/`.
#
# Existing SQLite users: see docs/migration/sqlite-to-postgres.md (P6).
# ──────────────────────────────────────────────────────────────────────────

services:
  postgres:
    image: ${VIBECODER_POSTGRES_IMAGE:-postgres:17-alpine}
    container_name: vibe-coder-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${VIBECODER_DB_NAME:-vibecoder}
      POSTGRES_USER: ${VIBECODER_DB_USER:-vibecoder}
      # Password must be set through VIBECODER_DB_PASSWORD in .env.
      # Detect missing values here instead of letting Postgres fail later.
      POSTGRES_PASSWORD: ${VIBECODER_DB_PASSWORD:?VIBECODER_DB_PASSWORD must be set in .env}
      TZ: ${TZ:-Asia/Seoul}
    volumes:
      - ${VIBE_DATA_ROOT:-./vibe-coder-data}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${VIBECODER_DB_USER:-vibecoder} -d ${VIBECODER_DB_NAME:-vibecoder}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    # Default: no external exposure; only the server container can reach it.
    # To connect with psql from the host, set VIBE_PG_PORT=5432 in .env and uncomment.
    # ports:
    #   - "${VIBE_PG_PORT:-5432}:5432"

  vibe-coder-server:
    # Local build (developer use)
    build:
      context: ..
      dockerfile: docker/Dockerfile

    # Docker Hub users can keep only image: instead of the build: block.
    image: ${VIBECODER_IMAGE:-siamakerlab/vibe-coder-server:latest}

    container_name: vibe-coder-server
    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy

    # Match host UID/GID to avoid ownership conflicts on mounted volumes.
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-Asia/Seoul}

      # JVM heap; tune for available host RAM.
      # v1.5.2 — explicit -Duser.timezone keeps Java/Kotlin time handling aligned
      # with container TZ and server-side UTC persistence.
      JAVA_OPTS: ${JAVA_OPTS:--Xmx2g -XX:+UseG1GC -Dfile.encoding=UTF-8 -Duser.timezone=${TZ:-Asia/Seoul}}

      # Optional first-run admin bootstrap. If unset, use /admin/setup.
      VIBECODER_ADMIN_USERNAME: ${VIBECODER_ADMIN_USERNAME:-}
      VIBECODER_ADMIN_PASSWORD: ${VIBECODER_ADMIN_PASSWORD:-}

      # CORS allowed hosts (v0.12.0+), comma-separated. Default `*` = anyHost.
      # For external origins, list only trusted origins such as "https://my-app.example.com".
      VIBECODER_CORS_ALLOWED_HOSTS: ${VIBECODER_CORS_ALLOWED_HOSTS:-*}
      VIBECODER_CORS_ALLOW_CREDENTIALS: ${VIBECODER_CORS_ALLOW_CREDENTIALS:-false}

      # v0.14.0 — PostgreSQL connection. The host is the service name on the same Docker network.
      VIBECODER_DB_HOST: ${VIBECODER_DB_HOST:-postgres}
      VIBECODER_DB_PORT: ${VIBECODER_DB_PORT:-5432}
      VIBECODER_DB_NAME: ${VIBECODER_DB_NAME:-vibecoder}
      VIBECODER_DB_USER: ${VIBECODER_DB_USER:-vibecoder}
      VIBECODER_DB_PASSWORD: ${VIBECODER_DB_PASSWORD:?VIBECODER_DB_PASSWORD must be set in .env}
      VIBECODER_DB_MAX_POOL: ${VIBECODER_DB_MAX_POOL:-10}
      VIBECODER_DB_SSLMODE: ${VIBECODER_DB_SSLMODE:-disable}

      # v0.77.0 — default SSR language when the user has no preference.
      #   Allowed values: en, ko. Default: en.
      #   Users can choose their language in Settings → General → Language.
      VIBECODER_DEFAULT_LANGUAGE: ${VIBECODER_DEFAULT_LANGUAGE:-en}

      # Agent runtime. Use mistral-vibe-acp to run without Claude Code/Anthropic.
      VIBECODER_AGENT_PROVIDER: ${VIBECODER_AGENT_PROVIDER:-mistral-vibe-acp}
      VIBECODER_AGENT_COMMAND: ${VIBECODER_AGENT_COMMAND:-vibe-acp}
      VIBECODER_AGENT_HOME: ${VIBECODER_AGENT_HOME:-/home/vibe/.vibe}
      VIBECODER_AGENT_TIMEOUT_MINUTES: ${VIBECODER_AGENT_TIMEOUT_MINUTES:-10}
      VIBECODER_AGENT_PERMISSION_MODE: ${VIBECODER_AGENT_PERMISSION_MODE:-allow_once}
      VIBE_HOME: ${VIBECODER_AGENT_HOME:-/home/vibe/.vibe}

    # LAN pairing, admin web UI, and API share the same port.
    ports:
      - "${VIBE_PORT:-17880}:17880"

    # ────────────────────────────────────────────────────────────────────
    # Volumes — v0.7.0 unified layout. v0.14.0 removed the SQLite path; Postgres
    # now stores its own data in the sidecar volume.
    #
    # All persistent data lives under one host directory:
    # ${VIBE_DATA_ROOT:-./vibe-coder-data}/.
    # Empty host directories are created on first boot and later filled by
    # doctor/MCP. They survive image replacements.
    # ────────────────────────────────────────────────────────────────────
    volumes:
      # Project source + build outputs; directly shareable with host IDEs.
      - ${VIBE_DATA_ROOT:-./vibe-coder-data}/workspace:/workspace

      # Server persistent data (logs / build metadata). SQLite lived here until
      # v0.13.x; v0.14.0 moved DB storage to the Postgres container.
      - ${VIBE_DATA_ROOT:-./vibe-coder-data}/server:/data

      # ── dev-tools — build environment tools under one parent ───────────
      # Android SDK (3-4GB, populated by doctor)
      - ${VIBE_DATA_ROOT:-./vibe-coder-data}/dev-tools/android-sdk:/opt/android-sdk
      # Gradle dependency cache (1-2GB, populated during the first build)
      - ${VIBE_DATA_ROOT:-./vibe-coder-data}/dev-tools/gradle:/home/vibe/.gradle
      # npm global prefix for vibe; MCP `npm install -g <pkg>` lands here.
      - ${VIBE_DATA_ROOT:-./vibe-coder-data}/dev-tools/npm-global:/home/vibe/.local
      # npx / npm download cache
      - ${VIBE_DATA_ROOT:-./vibe-coder-data}/dev-tools/npm-cache:/home/vibe/.npm
      # Playwright browsers (~300MB when using Playwright MCP)
      - ${VIBE_DATA_ROOT:-./vibe-coder-data}/dev-tools/playwright:/home/vibe/.cache/ms-playwright
      # Misc tool config (claude-code, npm config, etc.)
      - ${VIBE_DATA_ROOT:-./vibe-coder-data}/dev-tools/config:/home/vibe/.config
      # v1.2.0 — SSH keys used by vibe-coder for git clone/push. The entrypoint
      # generates an ED25519 keypair on first boot and never overwrites it.
      # Copy the public key from Settings -> SSH Key.
      - ${VIBE_DATA_ROOT:-./vibe-coder-data}/dev-tools/ssh:/home/vibe/.ssh
      # v1.5.0 — Android app keystore storage. Settings -> Keystores generates
      # release / debug / properties / admob files per package name. Keep this
      # backed up; losing release keys permanently blocks Play Store updates.
      - ${VIBE_DATA_ROOT:-./vibe-coder-data}/dev-tools/keystores:/home/vibe/keystores
      # v1.7.25 — persist Android Gradle's default debug.keystore. Without this,
      # every container restart changes the fingerprint and can cause
      # INSTALL_FAILED_UPDATE_INCOMPATIBLE for an existing packageName.
      # Copy the host ~/.android/debug.keystore here to share one debug cert.
      - ${VIBE_DATA_ROOT:-./vibe-coder-data}/dev-tools/android:/home/vibe/.android

      # ── Claude auth ─────────────────────────────────────────────
      # Default: vibe-coder-data/claude/ inside the unified data directory.
      # To share the host ~/.claude, set this in .env:
      #   VIBE_CLAUDE_DIR=~/.claude
      # as an override.
      - ${VIBE_CLAUDE_DIR:-./vibe-coder-data/claude}:/home/vibe/.claude

      # Mistral Vibe config/logs. For quick local testing you can set
      # VIBE_VIBE_DIR=/home/fcrescio/.vibe to reuse an already working config.
      - ${VIBE_VIBE_DIR:-./vibe-coder-data/vibe}:/home/vibe/.vibe

    networks:
      - default
      - ml-infra

    # Healthcheck: /health endpoint
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:17880/health"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3

    # Enable when using ADB over USB:
    # devices:
    #   - /dev/bus/usb:/dev/bus/usb

# v0.14.0 — no named volumes. All persistent data is bind-mounted under
# ./vibe-coder-data/. Postgres data is also in ./vibe-coder-data/postgres/, so
# backup/migration uses the same tree.

networks:
  ml-infra:
    name: ml-infra_ml-infra-net
    external: true
